services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sliderdb
      POSTGRES_USER: slideruser
      POSTGRES_PASSWORD: sliderpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slideruser -d sliderdb -h localhost -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000
      "
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://slideruser:sliderpass@db:5432/sliderdb

volumes:
  postgres_data:
  media_volume:
  static_volume: