version: '3.9'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sliderdb
      POSTGRES_USER: slideruser
      POSTGRES_PASSWORD: sliderpass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://slideruser:sliderpass@db:5432/sliderdb

volumes:
  postgres_data:
  media_volume: