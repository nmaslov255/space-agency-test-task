services:
  db:
    image: mysql:8
    env_file: .env
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build: .
    env_file: .env
    environment:
      DEBUG: 'False'
    entrypoint: /entrypoint.sh
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60;
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    restart: always
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles 
      - media_volume:/app/media 
    ports:
      - "80:80"
    depends_on:
      - web
    restart: always

volumes:
  mysql_data:
  media_volume:
  static_volume: